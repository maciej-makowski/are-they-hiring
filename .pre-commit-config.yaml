repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: tests
        name: unit + integration tests
        entry: uv run pytest tests/unit/ tests/integration/ -q
        language: system
        pass_filenames: false
        always_run: true
