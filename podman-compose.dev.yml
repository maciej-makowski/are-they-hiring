version: "3.8"
services:
  db:
    image: docker.io/postgres:16
    environment:
      POSTGRES_USER: arethey
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: arethey
    ports:
      - "5433:5432"
    volumes:
      - arethey-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arethey"]
      interval: 2s
      timeout: 5s
      retries: 10

  ollama:
    build:
      context: .
      dockerfile: Containerfile.ollama
    ports:
      - "11435:11434"
    devices:
      - nvidia.com/gpu=all
    environment:
      OLLAMA_GPU_LAYERS: "-1"
      OLLAMA_VULKAN: "1"

  web:
    build:
      context: .
      dockerfile: Containerfile.web
    environment:
      DATABASE_URL: postgresql+asyncpg://arethey:changeme@db:5432/arethey
      OLLAMA_HOST: http://ollama:11434
      TZ: UTC
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: Containerfile.scraper
    environment:
      DATABASE_URL: postgresql+asyncpg://arethey:changeme@db:5432/arethey
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      SCRAPE_SCHEDULE: "06:00,12:00,18:00"
      SCRAPE_RETRY_MAX: "3"
      SCRAPE_DELAY_SECONDS: "2"
      TZ: UTC
    depends_on:
      db:
        condition: service_healthy

volumes:
  arethey-db-data:
